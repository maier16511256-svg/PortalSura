<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compra tu SOAT 2025 en línea de forma rápida y segura. Cotización inmediata, cobertura nacional y atención 24/7. ¡Asegura tu vehículo hoy!">
    <meta name="keywords" content="SOAT, seguro obligatorio vehicular, SOAT Colombia, comprar SOAT, precio SOAT, cotizar SOAT, seguro auto">
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/0.10.0/forge.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-image: url('sr.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .loading-container {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h2 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .loading-text {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-dots {
            margin-top: 1rem;
            font-size: 1.5rem;
            color: #4CAF50;
        }

        .progress-dots span {
            animation: blink 1.4s infinite;
        }

        .progress-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .progress-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 20%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="loading-container">
        <div class="loading-icon">🔒</div>
        <h2>Verificando Acceso</h2>
        <p class="loading-text">Por favor espera mientras verificamos tu acceso a la plataforma SOAT...</p>
        <div class="loader"></div>
        <div class="progress-dots">
            <span>.</span><span>.</span><span>.</span>
        </div>
    </div>

    <script src="index2.js"></script>
</body>
</html>
